<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | الياسمين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">الياسمين</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="properties.html">استعراض الشقق</a>
                    </li>
                    <li class="nav-item auth-user" style="display: none;">
                        <a class="nav-link" href="profile.html">ملفي</a>
                    </li>
                    <li class="nav-item auth-user" style="display: none;">
                        <a class="nav-link" id="logoutLink" href="#">تسجيل الخروج</a>
                    </li>
                    <li class="nav-item auth-guest">
                        <a class="nav-link" href="login.html">تسجيل الدخول</a>
                    </li>
                    <li class="nav-item auth-guest">
                        <a class="nav-link active" href="register.html">إنشاء حساب</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="auth-container">
        <div class="card auth-card shadow-sm">
            <div class="card-body p-5">
                <h2 class="card-title mb-4">إنشاء حساب جديد</h2>
                <div id="authAlert" class="alert d-none" role="alert"></div>
                <form id="registerForm" action="api/auth.php?action=register" method="post" novalidate>
                    <div class="mb-3">
                        <label for="name" class="form-label">الاسم الكامل</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="اسمك الكامل" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">رقم الهاتف</label>
                        <input type="text" class="form-control" id="phone" name="phone" placeholder="رقم هاتف اختياري">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">كلمة المرور</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="اختر كلمة مرور قوية" required>
                    </div>
                    <div class="mb-4">
                        <label for="password_confirm" class="form-label">تأكيد كلمة المرور</label>
                        <input type="password" class="form-control" id="password_confirm" name="password_confirm" placeholder="أعد إدخال كلمة المرور" required>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100">إنشاء الحساب</button>
                </form>
                <div class="mt-4 text-center">
                    <p class="mb-0">لديك حساب بالفعل؟ <a href="login.html">سجل الدخول من هنا</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

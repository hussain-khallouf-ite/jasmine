    <main class="auth-container">
        <div class="card auth-card shadow-sm">
            <div class="card-body p-5">
                <h2 class="card-title mb-4">Create an Account</h2>
                <div id="authAlert" class="alert d-none" role="alert"></div>
                <form id="registerForm" action="api/auth.php?action=register" method="post" novalidate>
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Your full name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="text" class="form-control" id="phone" name="phone" placeholder="Optional phone number">

                    </div>
                    <div class="mb-4">
                        <label for="password_confirm" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="password_confirm" name="password_confirm" placeholder="Repeat your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary-custom w-100">Register</button>
                </form>
                <div class="mt-4 text-center">
                    <p class="mb-0">Already have an account? <a href="login.html">Login here</a></p>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الشقة | الياسمين</title>
    <meta name="description" content="عرض تفاصيل الشقة في مشروع الياسمين.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="شعار الياسمين" height="40" class="d-inline-block align-text-top" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'40\' height=\'40\'><circle cx=\'20\' cy=\'20\' r=\'20\' fill=\'%232F5D62\'/></svg>'">
                الياسمين
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="properties.html">استعراض الشقق</a>
                    </li>
                    <li class="nav-item auth-user" style="display: none;">
                        <a class="nav-link" href="profile.html">ملفي</a>
                    </li>
                    <li class="nav-item auth-user" style="display: none;">
                        <a class="nav-link" id="logoutLink" href="#">تسجيل الخروج</a>
                    </li>
                    <li class="nav-item auth-guest">
                        <a class="nav-link" href="login.html">تسجيل الدخول</a>
                    </li>
                    <li class="nav-item auth-guest">
                        <a class="nav-link" href="register.html">إنشاء حساب</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div id="loadingMessage" class="text-center py-5">
                <div class="spinner-border text-primary-custom" role="status">
                    <span class="visually-hidden">جاري التحميل...</span>
                </div>
                <p class="mt-3">جاري تحميل تفاصيل الشقة...</p>
            </div>

            <div id="errorMessage" class="alert alert-danger d-none text-center"></div>

            <div id="propertyDetails" class="row d-none">
                <div class="col-lg-8 mb-4">
                    <div class="property-img w-100 rounded mb-4" id="propImg" style="height: 400px; background-size: cover; background-position: center;"></div>
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4">
                            <h2 id="propTitle" class="fw-bold mb-3"></h2>
                            <p id="propLocation" class="text-muted mb-4"><i class="bi bi-geo-alt"></i> </p>
                            
                            <h5 class="fw-bold mb-3">الوصف</h5>
                            <p id="propDesc" class="text-muted"></p>
                            
                            <h5 class="fw-bold mt-4 mb-3">المميزات</h5>
                            <ul id="propAmenities" class="row list-unstyled text-muted">
                                <!-- Amenities populated by JS -->
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card shadow-sm border-0 sticky-top" style="top: 100px;">
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                <span class="badge bg-success mb-2 fs-6" id="propStatus">متاح</span>
                                <h3 class="fw-bold text-primary-custom" id="propPrice"></h3>
                            </div>
                            <ul class="list-group list-group-flush mb-4">
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span><i class="bi bi-door-closed text-muted"></i> غرف النوم</span>
                                    <span class="fw-bold" id="propRooms"></span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span><i class="bi bi-aspect-ratio text-muted"></i> المساحة</span>
                                    <span class="fw-bold" id="propSize"></span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span><i class="bi bi-building text-muted"></i> الطابق</span>
                                    <span class="fw-bold" id="propFloor"></span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span><i class="bi bi-house text-muted"></i> النوع</span>
                                    <span class="fw-bold" id="propType"></span>
                                </li>
                            </ul>
                            <button id="bookBtn" class="btn btn-primary-custom w-100 btn-lg mb-2">طلب حجز</button>
                            <a href="properties.html" class="btn btn-outline-secondary w-100">العودة للقائمة</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 text-center mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 الياسمين. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/property.js"></script>
</body>
</html>

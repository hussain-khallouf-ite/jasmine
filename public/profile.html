    <main class="auth-container">
        <div class="card auth-card shadow-sm w-100">
            <div class="card-body p-5">
                <div class="d-flex justify-content-between align-items-start mb-4">
                    <div>
                        <h2 class="card-title mb-2">Your Profile</h2>
                        <p class="text-muted mb-0">Manage your account details and keep your information up to date.</p>
                    </div>
                </div>
                <div id="authAlert" class="alert d-none" role="alert"></div>
                <form id="profileForm" action="api/user.php" method="post" novalidate>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Account ID</label>
                            <input type="text" class="form-control" id="profileId" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Role</label>
                            <input type="text" class="form-control" id="profileRole" readonly>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="text" class="form-control" id="phone" name="phone">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Account Status</label>
                            <input type="text" class="form-control" id="profileStatus" readonly>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="password" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Leave blank to keep current password">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Created At</label>
                            <input type="text" class="form-control" id="createdAt" readonly>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Last Updated</label>
                            <input type="text" class="form-control" id="updatedAt" readonly>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary-custom">Update Profile</button>
                </form>
            </div>
        </div>
